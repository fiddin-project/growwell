name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: growwell_test_only
          MYSQL_DATABASE: growwell_test
        ports:
          - 3308:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -pgrowwell_test_only"
          --health-interval=5s --health-timeout=5s --health-retries=20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: cp .env.test.example .env.test
      - run: npx prisma generate
      - run: npm run test:all
      - run: npm audit --audit-level=high

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew
      - run: ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleDebug
      - run: ./gradlew :app:bundleRelease -PGROWWELL_API_BASE_URL=https://api.example.invalid/api/
